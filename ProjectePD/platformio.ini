; ============================================================
;  PlatformIO Configuration — ESP32-S3 Audio Spectrum Visualizer
;  Board  : ESP32-S3 DevKitC-1
;  Display: 2.0" ST7789V TFT (240x320 panel, run rotated to 320x240
;           landscape) — CS=5  DC=6  RST=7  MOSI=11  SCK=12
;  Mic    : INMP441 I2S MEMS — SCK=41  WS=42  SD=2
;  Encoder: v5/KEY/s1/s2/GND — KEY=4  s1(CLK)=15  s2(DT)=16
;           (v5→3.3V, GND→GND are power pins, not wired to GPIOs)
; ============================================================

[env:esp32-s3-devkitc-1]
platform  = espressif32
board     = esp32-s3-devkitc-1
framework = arduino

; Flash & PSRAM
board_build.flash_mode          = qio
board_build.psram               = opi
board_build.arduino.memory_type = qio_opi

; Serial monitor
monitor_speed   = 115200
monitor_filters = esp32_exception_decoder, colorize

; Upload
upload_speed       = 921600
upload_resetmethod = nodemcu

; Partition scheme — large app, no OTA
board_build.partitions = huge_app.csv

; ---- Build flags ----
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DBOARD_HAS_PSRAM
    ; ---- Pines del Micrófono I2S ----
    -DI2S_SCK_PIN=41
    -DI2S_WS_PIN=42
    -DI2S_SD_PIN=2
    ; ---- Pines lógicos para tu archivo config.h ----
    -DTFT_SCL_PIN=12
    -DTFT_SDA_PIN=11
    -DTFT_CS_PIN=5
    -DTFT_DC_PIN=6
    -DTFT_RST_PIN=7
    ; ---- Pines del encoder rotativo (v5/KEY/s1/s2/GND) ----
    -DENC_KEY_PIN=4
    -DENC_S1_PIN=15
    -DENC_S2_PIN=16
    ; ---- CONFIGURACIÓN INYECTADA A TFT_eSPI ----
    -DUSER_SETUP_LOADED=1
    -DST7789_DRIVER=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=320
    -DTFT_MOSI=11
    -DTFT_SCLK=12
    -DTFT_CS=5
    -DTFT_DC=6
    -DTFT_RST=7
    -DTFT_INVERSION_ON=1
    -DTOUCH_CS=-1        ; no touch panel on this module — silences TFT_eSPI warning
    -DSPI_FREQUENCY=20000000  ; 20MHz para máxima estabilidad en protoboard
    ; ---- Configuración de Audio ----
    -DSAMPLE_RATE=44100
    -DFFT_SIZE=1024
    -DMAX_RECORD_SECONDS=10
    -O2
; Libraries
lib_deps =
    bodmer/TFT_eSPI @ ^2.5.43
    kosme/arduinoFFT @ ^2.0.1